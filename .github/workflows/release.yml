on:
  push:
    tags:
      - "v*"

name: release

permissions:
  contents: write

jobs:
  release:
    env:
      GOPATH: ${{ github.workspace }}

    defaults:
      run:
        working-directory: ${{ env.GOPATH }}/src/github.com/${{ github.repository }}

    runs-on: ubuntu-latest

    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: false

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          path: ${{ env.GOPATH }}/src/github.com/${{ github.repository }}

      - name: Build macOS arm64
        env:
          GOOS: darwin
          GOARCH: arm64
        run: go build -o bin/containerctl-${{ github.ref_name }}-darwin-arm64 ./cmd

      - name: Build Linux amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build -o bin/containerctl-${{ github.ref_name }}-linux-amd64 ./cmd

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.GOPATH }}/src/github.com/${{ github.repository }}/bin/containerctl-${{ github.ref_name }}-darwin-arm64
            ${{ env.GOPATH }}/src/github.com/${{ github.repository }}/bin/containerctl-${{ github.ref_name }}-linux-amd64
